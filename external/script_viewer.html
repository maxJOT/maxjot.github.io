<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Script Viewer</title>

<!-- Local highlight.js CSS -->
<link rel="stylesheet" href="highlight/sunburst.css">

<style>
  body {
    font-family: monospace;
    margin: 2em;
    background-color: #f9f9f9;
    font-size: 14px; /* page text */
  }
  pre {
    background-color: #000;
    padding: 1em;
    overflow-x: auto;
    font-size: 14px; /* code font */
  }
</style>
</head>
<body>

<pre><code id="script-content">Loading...</code></pre>

<!-- Local highlight.js JS -->
<script src="highlight/highlight.pack.js"></script>

<script>
(function() {
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');

    if (!file) {
        document.getElementById('script-content').textContent = 'No file specified.';
        return;
    }

    // Set page title to filename
    const filename = file.split('/').pop();
    document.title = filename;

    // Language mapping
    const langMap = {
        "sh": "bash",
        "bash": "bash",
        "py": "python",
        "js": "javascript",
        "json": "json",
        "html": "html",
        "css": "css",
        "md": "markdown",
        "c": "c",
        "cpp": "cpp",
        "java": "java"
    };

    const ext = filename.split('.').pop().toLowerCase();
    const langClass = langMap[ext] || '';  // fallback: no highlighting

    // Fetch file content
    fetch(file)
        .then(resp => resp.text())
        .then(text => {
            const codeEl = document.getElementById('script-content');
            codeEl.className = langClass;  // set language class dynamically
            codeEl.textContent = text;
            hljs.highlightBlock(codeEl);   // old API for Windmill’s highlight.js
        })
        .catch(err => {
            document.getElementById('script-content').textContent = 'Error loading file: ' + err;
        });
})();
</script>

</body>
</html>
